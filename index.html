<!DOCTYPE html>
<!-- BeerOS — © 2026 icemanxbe · PolyForm Noncommercial License 1.0.0 (see LICENSE) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BeerOS · Beer Brewing Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div id="app">
<div id="topbar">
  <div class="logo">
    <div class="logo-mark">🍺</div>
    <span class="logo-text">BEEROS<span class="sub">Beer Brewing Companion</span></span>
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="topbar-date"></span>
  </div>
</div>
<div id="sidebar">
  <div class="sidebar-section">Navigation</div>
  <div class="nav-item active" onclick="switchPage('batches')" id="nav-batches"><span class="ni">⚗</span><span>My Batches</span></div>
  <div class="nav-item" onclick="switchPage('recipes')" id="nav-recipes"><span class="ni">📜</span><span>Recipe Library</span></div>
  <div class="nav-item" onclick="switchPage('malts')" id="nav-malts"><span class="ni">🌾</span><span>Malt &amp; Grain Library</span></div>
  <div class="nav-item" onclick="switchPage('hops')" id="nav-hops"><span class="ni">🌿</span><span>Hop Library</span></div>
  <div class="nav-item" onclick="switchPage('yeasts')" id="nav-yeasts"><span class="ni">🧫</span><span>Yeast Library</span></div>
  <div class="nav-item" onclick="switchPage('water')" id="nav-water"><span class="ni">💧</span><span>Water Chemistry</span></div>
  <div class="nav-item" onclick="switchPage('tools')" id="nav-tools"><span class="ni">⚒</span><span>Brewing Tools</span></div>
  <div class="sidebar-section" style="margin-top:8px">Active Batches</div>
  <div class="sidebar-batch-list" id="sidebar-batches"></div>
  <div class="sidebar-bottom">
    <button class="btn-new-batch" onclick="openNewBatchModal()">+<span> New Batch</span></button>
  </div>
</div>
<div id="main">
  <div id="batches-mount" class="page"></div>
  <div id="recipes-mount" class="page" style="display:none"></div>
  <div id="malts-mount" class="page" style="display:none"></div>
  <div id="hops-mount" class="page" style="display:none"></div>
  <div id="yeasts-mount" class="page" style="display:none"></div>
  <div id="water-mount" class="page" style="display:none"></div>
  <div id="tools-mount" class="page" style="display:none"></div>
</div>
</div>
<div id="modal-root"></div>
<script src="/core/domain/calculators.js"></script>
<script src="/core/data/recipes.js"></script>
<script src="/core/data/malts.js"></script>
<script src="/core/data/hops.js"></script>
<script src="/core/data/yeasts.js"></script>
<script src="/core/data/water-profiles.js"></script>
<script src="/core/domain/ingredient-links.js"></script>
<script src="/core/state/state.js"></script>
<script src="/core/domain/advisor.js"></script>
<script src="/core/views/vessel.js"></script>
<script src="/core/views/recipes.js"></script>
<script src="/core/views/malts.js"></script>
<script src="/core/views/hops.js"></script>
<script src="/core/views/yeasts.js"></script>
<script src="/core/views/water.js"></script>
<script src="/core/views/batches.js"></script>
<script src="/core/tools/brewing-tools.js"></script>
<script>
function switchPage(page) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.id === 'nav-' + page));
  document.getElementById('batches-mount').style.display = page === 'batches' ? '' : 'none';
  document.getElementById('recipes-mount').style.display = page === 'recipes' ? '' : 'none';
  document.getElementById('malts-mount').style.display = page === 'malts' ? '' : 'none';
  document.getElementById('hops-mount').style.display = page === 'hops' ? '' : 'none';
  document.getElementById('yeasts-mount').style.display = page === 'yeasts' ? '' : 'none';
  document.getElementById('water-mount').style.display = page === 'water' ? '' : 'none';
  document.getElementById('tools-mount').style.display = page === 'tools' ? '' : 'none';
}
document.getElementById('topbar-date').textContent = new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
(async function () {
  await loadState();
  rerenderBatchesPage();
  rerenderRecipesPage();
  rerenderMaltsPage();
  rerenderHopsPage();
  rerenderYeastsPage();
  rerenderWaterPage();
  rerenderTools();
  renderSidebarBatches();

  if (await mergeTelemetry()) { rerenderBatchesPage(); renderSidebarBatches(); }
  setInterval(async () => {
    if (await mergeTelemetry()) { rerenderBatchesPage(); renderSidebarBatches(); }
  }, 60000);
})();
</script>
</body>
</html>
